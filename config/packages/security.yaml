security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            entry_point: form_login
            lazy: true
            form_login:
                login_path: security_login
                check_path: security_login
                username_parameter: '_email'
                enable_csrf: true
            custom_authenticator: 'App\Security\LoginAuthenticator'
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 2592000 # 30 days in seconds
                path: /
                # Security Flags
                secure: true
                httponly: true
                samesite: lax
            logout:
                path: security_logout
                clear_site_data:
                    - cache
                    - storage
                    - executionContexts
                    # don't clear site cookies when using 2fa trusted device feature
                    # - cookies
            # https://symfony.com/doc/current/security/impersonating_user.html
            switch_user: true
            login_throttling:
                max_attempts: 5
            two_factor:
                auth_form_path: 2fa_login
                check_path: 2fa_login_check
                multi_factor: false
                trusted_parameter_name: _trusted  # Name of the parameter for the trusted device option

    # Note: Only the *first* matching rule is applied
    access_control:
        - { path: ^/2fa/email/resend, roles: PUBLIC_ACCESS }
        - { path: ^/2fa/text/resend, roles: PUBLIC_ACCESS }
        # - { path: ^/admin, roles: ROLE_ADMIN }
        # - { path: ^/profile, roles: ROLE_USER }

    role_hierarchy:
        ROLE_SUPERUSER: [ROLE_ADMIN, ROLE_ALLOWED_TO_SWITCH]  # ROLE_ALLOWED_TO_SWITCH allows impersonation of other users
        ROLE_ADMIN: [ROLE_USER]  # can add/edit users
        ROLE_USER: []

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
